<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영어 모의고사 해설지 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
:root {
    --primary-color: #4F46E5;
    --primary-hover-color: #4338CA;
    --primary-glow: rgba(79, 70, 229, 0.2);
    --background-color: #F8FAFB;
    --background-gradient: linear-gradient(135deg, #F8FAFB 0%, #F3F4F6 100%);
    --panel-background-color: rgba(255, 255, 255, 0.95);
    --panel-elevated-color: rgba(255, 255, 255, 1);
    --border-color: rgba(200, 210, 230, 0.4);
    --border-glow: rgba(79, 70, 229, 0.15);
    --text-color: #1F2937;
    --text-light-color: #6B7280;
    --text-dim-color: #9CA3AF;
    --error-color: #EF4444;
    --error-glow: rgba(239, 68, 68, 0.15);
    --success-color: #10B981;
    --warning-color: #F59E0B;
    --font-family: 'Noto Sans KR', sans-serif;
    --glass-bg: rgba(255, 255, 255, 0.8);
    --glass-border: rgba(79, 70, 229, 0.08);
    --shadow-color: rgba(0, 0, 0, 0.06);
}

.irrelevant-sentence {
    text-decoration: line-through;
    text-decoration-color: #EF4444;
    text-decoration-thickness: 2px;
}

.hanging-indent {
    padding-left: 0.9rem;
    text-indent: -0.9rem;
    margin-bottom: 0.4rem;
}

.hanging-indent .marker {
    display: inline-block;
    width: 0.9rem;
    font-weight: 700;
    color: var(--primary-color);
}

.translation-paragraph {
    margin-bottom: 0.75rem;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: var(--font-family);
    background: var(--background-gradient);
    background-attachment: fixed;
    color: var(--text-color);
    line-height: 1.6;
    min-height: 100vh;
}

#root {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

.app-wrapper {
    width: 100%;
    max-width: 100%;
    margin: 0;
    border-radius: 0;
    box-shadow: none;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: transparent;
    backdrop-filter: none;
    border: none;
    animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.app-header {
    text-align: center;
    background: linear-gradient(135deg, #061E44 0%, #2B6CB0 100%);
    color: white;
    padding: 1.5rem 2rem;
    position: relative;
    overflow: hidden;
}

.app-header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0.8; }
}

.header-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.8rem;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    padding: 0.4rem 1.2rem 0.4rem 0.4rem;
    margin-top: 0.8rem;
    margin-bottom: 0.8rem;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(10px);
}

.badge-icon {
    background: linear-gradient(135deg, #FFB703 0%, #EA580C 100%);
    color: white;
    font-weight: 800;
    font-size: 1.1rem;
    width: 28px;
    height: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 8px;
}

.badge-text {
    color: white;
    font-weight: 600;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
}

.app-header h1 {
    font-size: 3rem;
    color: white;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5),
                 0 2px 10px rgba(0, 0, 0, 0.3);
    font-weight: 700;
    margin-bottom: 0.5rem;
}

.app-header p {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.95);
    position: relative;
    z-index: 1;
    margin-top: 0.5rem;
}

.app-container {
    display: grid;
    grid-template-columns: 380px minmax(0, 1fr);
    gap: 2rem;
    width: 100%;
    max-width: 1800px; /* Widened content area */
    margin: 0 auto;
    padding: 2rem;
}

.controls-panel, .preview-panel {
    background: var(--panel-elevated-color);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 0 1px var(--border-color),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
    padding: 1.5rem;
    overflow-y: auto;
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
}

.controls-panel {
    animation: fadeInUp 0.8s ease-out;
    background: linear-gradient(135deg, #f2f7ff 0%, #f9f5ff 100%); /* Pastel background */
}

.preview-panel {
    animation: fadeInUp 1s ease-out;
}

.controls-panel h2 {
    font-size: 1.25rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid var(--primary-color);
    padding-bottom: 0.75rem;
    color: var(--primary-color);
    font-weight: 700;
    text-shadow: 0 0 10px var(--primary-glow);
}

.upload-section {
    margin-bottom: 1.5rem;
}

.upload-section h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-color);
}

.drop-zone {
    border: 2px dashed var(--border-color);
    border-radius: 12px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(0, 212, 255, 0.02);
}

.drop-zone:hover:not(.disabled) {
    border-color: var(--primary-color);
    background: rgba(0, 212, 255, 0.05);
    box-shadow: 0 0 20px var(--primary-glow),
                inset 0 0 20px rgba(0, 212, 255, 0.05);
}

.drop-zone.drag-over {
    background: rgba(0, 212, 255, 0.1);
    border-color: var(--primary-color);
    box-shadow: 0 0 30px var(--primary-glow),
                inset 0 0 30px rgba(0, 212, 255, 0.1);
    transform: scale(1.02);
}

.drop-zone.disabled {
    cursor: not-allowed;
    background: #E5E7EB;
    border-color: var(--text-dim-color);
}

.drop-zone.disabled p {
    color: var(--text-dim-color);
}

.drop-zone p {
    color: var(--text-light-color);
    font-size: 0.9rem;
}

.drop-zone .browse-link {
    color: var(--primary-color);
    font-weight: 600;
    text-shadow: 0 0 10px var(--primary-glow);
}

.file-name-display {
    display: inline-block;
    word-break: break-all;
    font-weight: 600;
    color: var(--primary-color);
}

.file-name-display small {
    font-weight: normal;
    color: var(--text-dim-color);
}

.pdf-preview-container {
    padding: 2rem;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    margin: 1rem auto;
    width: 100%;
    max-width: 800px;
    height: calc(100vh - 150px);
    display: flex;
    flex-direction: column;
}

.pdf-preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}

.pdf-preview-container h3 {
    margin-bottom: 0;
    color: var(--primary-color);
    font-size: 1.2rem;
}

.btn-open-new-tab {
    font-size: 0.85rem;
    color: var(--primary-color);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid var(--primary-color);
    border-radius: 6px;
    transition: all 0.2s;
}

.btn-open-new-tab:hover {
    background: var(--primary-color);
    color: white;
}

.pdf-object {
    flex: 1;
    width: 100%;
    border: 1px solid #eee;
    border-radius: 8px;
}

.pdf-blocked-message {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #f8fafc;
    border: 2px dashed #cbd5e1;
    border-radius: 8px;
    padding: 2rem;
    color: #64748b;
}

.pdf-blocked-message-small {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #f8fafc;
    padding: 1rem;
    font-size: 0.9rem;
    color: #64748b;
}

.pdf-preview-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.file-preview {
    margin-top: 1rem;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
}

.image-preview {
    width: 100%;
    max-height: 400px;
    object-fit: contain;
    display: block;
}

.loader {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    padding: 1.5rem 0;
    color: var(--text-light-color);
    text-align: center;
}

.loader-content {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.spinner {
    border: 4px solid rgba(0, 212, 255, 0.1);
    border-left-color: var(--primary-color);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 10px var(--primary-glow);
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.error-message {
    background: linear-gradient(135deg, rgba(255, 71, 87, 0.15) 0%, rgba(255, 71, 87, 0.05) 100%);
    color: #ff6b7a;
    border: 1px solid rgba(255, 71, 87, 0.3);
    border-radius: 12px;
    padding: 1rem;
    text-align: left;
    margin: 1rem 0;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: 0 4px 15px var(--error-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

.options-section {
    margin-top: 1.5rem;
}

.options-section .option-item {
    margin-bottom: 1rem;
}

.options-section .option-item small {
    font-size: 0.8rem;
    color: var(--text-light-color);
    margin-top: 0.25rem;
    display: block;
}

.options-section label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-color);
}

select, button, input[type="text"] {
    width: 100%;
    padding: 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    font-family: var(--font-family);
    font-size: 1rem;
    background: #FFFFFF;
    color: var(--text-color);
    transition: all 0.3s ease;
}

select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px var(--primary-glow),
                0 0 20px var(--primary-glow);
}

select {
    cursor: pointer;
}

select option {
    background: #F3F4F6;
    color: var(--text-color);
    padding: 0.5rem;
}

#question-select {
    height: 200px;
}

button {
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
}

.action-buttons {
    margin: 1.5rem 0;
}

button.btn-secondary {
    background: #F0F4FF;
    color: var(--text-color);
    border: 1px solid var(--border-color);
}

button.btn-secondary:hover:not(:disabled) {
    background: #E0E7FF;
    border-color: var(--primary-color);
    box-shadow: 0 0 15px rgba(79, 70, 229, 0.15);
}

button:disabled {
    cursor: not-allowed;
    background: #D1D5DB;
    color: var(--text-dim-color);
    border-color: var(--text-dim-color);
    transform: none;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary-color) 0%, #4F46E5 100%);
    color: white;
    font-weight: 700;
    border: none;
    box-shadow: 0 4px 15px var(--primary-glow),
                0 0 0 1px rgba(79, 70, 229, 0.15);
    position: relative;
    overflow: hidden;
}

.btn-primary::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.btn-primary:hover:not(:disabled)::before {
    width: 300px;
    height: 300px;
}

.btn-primary:hover:not(:disabled) {
    box-shadow: 0 6px 25px var(--primary-glow),
                0 0 0 1px var(--primary-color),
                0 0 30px var(--primary-glow);
}

.btn-stop {
    background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
    color: white;
    border: none;
    padding: 0.5rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    width: auto;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
}

.btn-stop:hover {
    background: linear-gradient(135deg, #5a6268 0%, #343a40 100%);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
}

.preview-panel {
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(249, 250, 251, 1) 100%);
    padding: 2rem 1rem;
    overflow-x: auto;
}

.preview-placeholder {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%;
    color: var(--text-light-color);
    text-align: center;
    background: #F9FAFB;
    border-radius: 12px;
    white-space: pre-wrap;
    border: 1px dashed var(--border-color);
}

#preview-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin: 0 auto;
}

::-webkit-scrollbar {
    width: 10px;
    height: 10px;
}
::-webkit-scrollbar-track {
    background: rgba(240, 244, 255, 0.8);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb {
    background: linear-gradient(135deg, var(--primary-color) 0%, #4F46E5 100%);
    border-radius: 10px;
    border: 2px solid rgba(240, 244, 255, 0.8);
}
::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(135deg, var(--primary-hover-color) 0%, #007acc 100%);
    box-shadow: 0 0 10px var(--primary-glow);
}
* {
    scrollbar-width: thin;
    scrollbar-color: var(--primary-color) rgba(240, 244, 255, 0.8);
}

::selection {
    background: var(--primary-color);
    color: white;
}
::-moz-selection {
    background: var(--primary-color);
    color: white;
}

.analysis-sheet {
    background-color: white;
    width: 210mm;
    height: 297mm;
    padding: 15mm;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    font-size: 10.5pt;
    line-height: 1.55;
    color: black;
    overflow: hidden;
}

.analysis-sheet.is-long-question {
    font-size: 8.8pt !important;
    padding: 11mm !important;
}

.preview-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid #007bff;
    padding-bottom: 0.5rem;
    margin-bottom: 0.5rem;
}
.preview-header .title {
    font-weight: 700;
    font-size: 1.2em;
}

.preview-header .info {
    font-weight: 500;
    font-size: 1em;
}

.preview-body {
    display: grid;
    grid-template-columns: 7fr 3fr;
    gap: 1.5rem;
    flex-grow: 1;
    overflow: hidden;
}

.analysis-sheet.is-long-question .preview-body {
    grid-template-columns: 7fr 3fr !important;
    gap: 1.1rem !important;
}

.analysis-sheet.is-long-question .question-text-container {
    font-size: 10.8pt !important;
    line-height: 1.5 !important;
}

.preview-body pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: var(--font-family);
}

.question-number {
    font-size: 1.5em;
    font-weight: bold;
    margin-bottom: 0.75rem;
}

.question-text-container {
    font-size: 12.5pt;
    line-height: 1.7;
}

.question-text-container.question-text-container-41-42 {
    line-height: 1.45;
}

.question-text-container.question-text-container-40 {
    line-height: 1.45;
}

.question-text-container-40 .question-passage,
.question-text-container-40 .question-after-box {
    margin-bottom: 0.5rem;
}

.question-text-container-40 .question-choices {
    margin-bottom: 0.5rem;
}

.question-text-container-41-42 .question-passage {
    margin-bottom: 0.5rem;
}

.question-text-container-41-42 .sub-questions-container {
    margin-top: 1rem;
    padding-top: 0.5rem;
}

.question-text-container-41-42 .sub-question {
    margin-bottom: 0.75rem;
}

.question-text-container-41-42 .question-prompt {
    margin-bottom: 0.25rem;
}

.question-text-container-41-42 .question-choices li {
    margin-bottom: 0.1rem;
}

.question-prompt {
    margin-bottom: 0.5rem;
}

.question-passage, .question-after-box {
    margin-bottom: 1rem;
    text-align: justify;
    text-justify: inter-word;
    word-wrap: break-word;
}

.answer-blank {
    display: inline-block;
    border-bottom: 1.2px solid black;
    vertical-align: -0.2em;
    margin: 0 0.1em;
    max-width: 20ch;
}
.answer-blank-text {
    visibility: hidden;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
    display: inline-block;
}

.starred-vocabulary-container {
    display: block;
    width: 100%;
}

.starred-vocabulary {
    font-size: 8.5pt;
    text-align: right;
    margin: 1rem 0;
}

.question-choices {
    margin-bottom: 1rem;
    list-style-type: none;
    padding-left: 0;
}

.question-choices li {
    margin-bottom: 0.25rem;
    display: flex;
    align-items: baseline;
    gap: 0.5em;
}

.choices-layout-36-37 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem 1rem;
}

.choices-layout-36-37 li:nth-child(5) {
    grid-column: 1 / 3;
}

.choice-header-40 {
    display: grid;
    grid-template-columns: 2em 1fr auto 1fr;
    gap: 0 0.4rem;
    margin-bottom: 0.15rem;
    font-weight: 500;
    font-size: 0.95em;
}

.choice-header-40 span:first-child {
    grid-column: 2;
    text-align: center;
}
.choice-header-40 span:last-child {
    grid-column: 4;
    text-align: center;
}

.question-choices li.choice-item-40 {
    display: grid;
    grid-template-columns: 2em 1fr auto 1fr;
    gap: 0 0.4rem;
    align-items: center;
    text-indent: 0;
    padding-left: 0;
    margin-bottom: 0.15rem;
}

.choice-item-40 .choice-part-a, .choice-item-40 .choice-part-b {
    text-align: center;
}

.choice-item-40 .choice-part-a {
    grid-column: 2;
}

.choice-item-40 .choice-dots {
    grid-column: 3;
    text-align: center;
    padding: 0 0.5rem;
    color: #666;
}
.choice-item-40 .choice-part-b {
    grid-column: 4;
}

.boxed-text {
    border: 1px solid #333;
    padding: 0.6rem 0.8rem;
    margin: 0.6rem 0;
    border-radius: 4px;
    background-color: #f8f9fa;
    word-wrap: break-word;
    text-align: justify;
    text-justify: inter-word;
}

.summary-prompt {
    text-align: center;
    font-weight: bold;
}

.summary-box {
    text-align: justify;
    line-height: 1.4;
}

.summary-arrow {
    text-align: center;
    font-size: 1.2rem;
    margin: 0.2rem 0;
    color: #555;
}

.summary-blank {
    display: inline-block;
    font-weight: bold;
    border-bottom: 1.2px solid black;
    padding: 0 3em;
    margin: 0 0.1em;
    vertical-align: -0.2em;
}

.sequence-paragraph {
    margin-bottom: 0.5rem;
    text-indent: -2em;
    padding-left: 2em;
    text-align: justify;
    text-justify: inter-word;
}

.sentence-marker {
    display: inline-block;
    margin-right: 0.3em;
}

.sub-questions-container {
    margin-top: 1.5rem;
    border-top: 1px solid #eee;
    padding-top: 1rem;
}

.sub-question {
    margin-bottom: 1.5rem;
}

.sub-question:last-child {
    margin-bottom: 0;
}

.question-choices.choices-horizontal {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5em 1.5em;
    padding-left: 0;
}

.question-choices.choices-horizontal li {
    padding-left: 0;
    text-indent: 0;
    margin-bottom: 0;
}

.question-main-content {
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.vocabulary-block {
    margin-top: 1.2rem;
    font-size: 9pt;
